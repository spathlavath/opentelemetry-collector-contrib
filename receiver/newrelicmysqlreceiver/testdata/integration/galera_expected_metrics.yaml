resourceMetrics:
  - resource: {}
    scopeMetrics:
      - metrics:
          - description: The number of times each type of command has been executed.
            name: newrelicmysql.commands
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "0"
                  attributes:
                    - key: command
                      value:
                        stringValue: commit
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "2"
                  attributes:
                    - key: command
                      value:
                        stringValue: delete
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: command
                      value:
                        stringValue: delete_multi
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: command
                      value:
                        stringValue: insert
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: command
                      value:
                        stringValue: insert_select
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: command
                      value:
                        stringValue: load
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: command
                      value:
                        stringValue: replace
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: command
                      value:
                        stringValue: replace_select
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: command
                      value:
                        stringValue: rollback
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "1"
                  attributes:
                    - key: command
                      value:
                        stringValue: select
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: command
                      value:
                        stringValue: update
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
                - asInt: "0"
                  attributes:
                    - key: command
                      value:
                        stringValue: update_multi
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: "1"
          - description: The number of connection attempts (successful or not) to the MySQL server.
            name: newrelicmysql.connection.count
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "8"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: "1"
          - description: The number of internal ROLLBACK statements.
            name: newrelicmysql.db.handler_rollback
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "0"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: "1"
          - description: The number of tables that have been opened.
            name: newrelicmysql.db.opened_tables
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "23"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: "1"
          - description: Average distance between the lowest and highest seqno values that can be possibly applied in parallel (potential degree of parallelization).
            gauge:
              dataPoints:
                - asDouble: 0
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: newrelicmysql.galera.wsrep_cert_deps_distance
            unit: "1"
          - description: Current number of nodes in the Galera cluster.
            gauge:
              dataPoints:
                - asInt: "1"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: newrelicmysql.galera.wsrep_cluster_size
            unit: '{nodes}'
          - description: The fraction of time since the last status query that replication was paused due to flow control.
            gauge:
              dataPoints:
                - asDouble: 0
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: newrelicmysql.galera.wsrep_flow_control_paused
            unit: "1"
          - description: The total time spent in a paused state measured in nanoseconds.
            name: newrelicmysql.galera.wsrep_flow_control_paused_ns
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "0"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: ns
          - description: Number of FC_PAUSE events received since the last status query, including those that cause the provider to pause.
            name: newrelicmysql.galera.wsrep_flow_control_recv
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "0"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: '{events}'
          - description: Number of FC_PAUSE events sent since the last status query.
            name: newrelicmysql.galera.wsrep_flow_control_sent
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "0"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: '{events}'
          - description: Number of local transactions that failed certification since the last status query.
            name: newrelicmysql.galera.wsrep_local_cert_failures
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "0"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: '{transactions}'
          - description: Current length of the local received queue (number of writesets waiting to be applied).
            gauge:
              dataPoints:
                - asInt: "0"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: newrelicmysql.galera.wsrep_local_recv_queue
            unit: '{writesets}'
          - description: Average length of the local received queue since the last status query.
            gauge:
              dataPoints:
                - asDouble: 0.5
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: newrelicmysql.galera.wsrep_local_recv_queue_avg
            unit: '{writesets}'
          - description: Current length of the send queue (number of writesets waiting to be sent).
            gauge:
              dataPoints:
                - asInt: "0"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: newrelicmysql.galera.wsrep_local_send_queue
            unit: '{writesets}'
          - description: Average length of the send queue since the last status query.
            gauge:
              dataPoints:
                - asDouble: 0
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: newrelicmysql.galera.wsrep_local_send_queue_avg
            unit: '{writesets}'
          - description: Internal Galera Cluster FSM state number.
            gauge:
              dataPoints:
                - asInt: "4"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: newrelicmysql.galera.wsrep_local_state
            unit: "1"
          - description: Total number of write-sets received from other nodes.
            name: newrelicmysql.galera.wsrep_received
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "2"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: '{writesets}'
          - description: Total size in bytes of write-sets received from other nodes.
            name: newrelicmysql.galera.wsrep_received_bytes
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "144"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: By
          - description: Total size in bytes of write-sets replicated to other nodes.
            name: newrelicmysql.galera.wsrep_replicated_bytes
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "0"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: By
          - description: The number of dirty pages in the InnoDB buffer pool.
            gauge:
              dataPoints:
                - asInt: "161"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: newrelicmysql.innodb.buffer_pool_dirty
            unit: "1"
          - description: The number of free pages in the InnoDB buffer pool.
            gauge:
              dataPoints:
                - asInt: "7761"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: newrelicmysql.innodb.buffer_pool_free
            unit: "1"
          - description: The number of logical read requests.
            name: newrelicmysql.innodb.buffer_pool_read_requests
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "1572"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: "1"
          - description: The number of reads that InnoDB could not satisfy from the buffer pool.
            name: newrelicmysql.innodb.buffer_pool_reads
            sum:
              aggregationTemporality: 2
              dataPoints:
                - asInt: "151"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
              isMonotonic: true
            unit: "1"
          - description: The total size of the InnoDB buffer pool in pages.
            gauge:
              dataPoints:
                - asInt: "8064"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: newrelicmysql.innodb.buffer_pool_total
            unit: "1"
          - description: The number of used pages in the InnoDB buffer pool.

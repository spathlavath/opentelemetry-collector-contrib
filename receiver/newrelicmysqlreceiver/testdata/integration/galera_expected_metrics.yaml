                - asInt: "303"
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: newrelicmysql.innodb.buffer_pool_used
            unit: "1"
          - description: The InnoDB buffer pool utilization percentage.
            gauge:
              dataPoints:
                - asDouble: 3.757440476190476
                  startTimeUnixNano: "1000000"
                  timeUnixNano: "2000000"
            name: newrelicmysql.innodb.buffer_pool_utilization
            unit: '%'
          - description: The amount of data read.
            name: newrelicmysql.innodb.data_reads
            sum:
              aggregationTemporality: 2
